name: 'Serviapp Backend CI/CD'

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build:
    name: Build environment and test
    runs-on: ubuntu-latest  # better to use linux than other os unless there are specific os needs
    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.14'    # current version being used
            cache: 'pip'              # speeds up dependency installation by caching pip packages
            cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "MONGO_URL=${{ secrets.MONGO_URL }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Get Runner Public IP
        id: ip
        run: echo "RUNNER_IP=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_ENV

      # 2. Download and install the MongoDB Atlas CLI tool
      - name: Setup Atlas CLI
        uses: mongodb/atlas-github-action@v0.2.2

      # # 3. Authenticate with Atlas and append the Runner's IP to the firewall whitelist
      # - name: Authorize Runner IP in Atlas
      #   env:
      #     MONGODB_ATLAS_PUBLIC_API_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
      #     MONGODB_ATLAS_PRIVATE_API_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
      #   run: |
      #     atlas config set silence_storage_warning true

      #     atlas security network accessList create $RUNNER_IP --comment "Temporary GitHub Runner" --projectId ${{ secrets.ATLAS_PROJECT_ID }}

      #     # Give Atlas 15 seconds to apply the firewall rules across its nodes
      #     sleep 15

      # no tests yet
      - name: Run tests
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python -m pytest -v

      # - name: Remove Runner IP from Atlas Firewall
      #   if: always()
      #   env:
      #     MONGODB_ATLAS_PUBLIC_API_KEY: ${{ secrets.ATLAS_PUBLIC_KEY }}
      #     MONGODB_ATLAS_PRIVATE_API_KEY: ${{ secrets.ATLAS_PRIVATE_KEY }}
      #   run: |
      #     atlas config set silence_storage_warning true
      #     atlas security network accessList delete $RUNNER_IP --projectId ${{ secrets.ATLAS_PROJECT_ID }} --force

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@747373cdb7b9b3f561438e063ee0815b71584f1b
        with:
          api-key: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ github.ref_name == 'main' && secrets.RENDER_SERVICE_ID_MAIN || secrets.RENDER_SERVICE_ID_STAGING }}
          wait-for-success: true
