name: 'Serviapp Backend CI/CD'

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build:
    name: Build environment and test
    runs-on: ubuntu-latest  # better to use linux than other os unless there are specific os needs
    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.14'    # current version being used
            cache: 'pip'              # speeds up dependency installation by caching pip packages
            cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "MONGO_URL=${{ secrets.MONGO_URL }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Get Runner Public IP
        id: ip
        run: |
          echo "IP=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Add runner IP to Atlas
        run: |
          curl --silent --fail-with-body \
              --user "${{ secrets.ATLAS_PUBLIC_KEY }}:${{ secrets.ATLAS_PRIVATE_KEY }}" \
              --digest \
              --header "Accept: application/vnd.atlas.2023-01-01+json" \
              --header "Content-Type: application/json" \
              --request POST \
              --data '[{
                "ipAddress":"${{ steps.ip.outputs.IP }}",
                "comment":"GitHub Actions"
              }]' \
              "https://cloud.mongodb.com/api/atlas/v2/groups/${{ secrets.ATLAS_PROJECT_ID }}/accessList"
              > /dev/null

      - name: Wait for whitelist propagation
        run: sleep 15

      - name: Run tests
        run: python -m pytest -v

      - name: Remove runner IP
        if: always()
        run: |
          curl --fail-with-body \
              --user "${{ secrets.ATLAS_PUBLIC_KEY }}:${{ secrets.ATLAS_PRIVATE_KEY }}" \
              --digest \
              --header "Accept: application/vnd.atlas.2023-01-01+json" \
              --request DELETE \
              "https://cloud.mongodb.com/api/atlas/v2/groups/${{ secrets.ATLAS_PROJECT_ID }}/accessList/${{ steps.ip.outputs.IP }}"

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@747373cdb7b9b3f561438e063ee0815b71584f1b
        with:
          api-key: ${{ secrets.RENDER_API_KEY }}
          service-id: ${{ github.ref_name == 'main' && secrets.RENDER_SERVICE_ID_MAIN || secrets.RENDER_SERVICE_ID_STAGING }}
          wait-for-success: true
