name: 'Serviapp Backend CI'

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  build:
    name: Build environment and test
    runs-on: ubuntu-latest  # better to use linux than other os unless there are specific os needs
    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.14.3'    # current version being used
            cache: 'pip'                # speeds up dependency installation by caching pip packages
            cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # no tests yet in this branch
      # - name: Run tests
      #   run: pytest

