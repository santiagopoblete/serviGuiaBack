name: 'Serviapp Backend Main Branch CI/CD'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build environment and test
    runs-on: ubuntu-latest  # better to use linux than other os unless there are specific os needs
    steps:
      - name: Download code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.14'    # current version being used
            cache: 'pip'                # speeds up dependency installation by caching pip packages
            cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # no tests yet
      # - name: Run tests
      #   run: pytest

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          api-key: ${{ secrets.RENDER_API_KEY_MAIN }}
          service-id: ${{ secrets.RENDER_SERVICE_ID_MAIN }}
          wait-for-success: true

